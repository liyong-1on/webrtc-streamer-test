server:
  port: 8081

spring:
  # 数据库配置 - 使用MySQL
  datasource:
    url: jdbc:mysql://192.168.66.128:13306/webrtc_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  # MyBatis-Plus Configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# WebRTC Streamer Configuration
webrtc-streamer:
  base-url: http://127.0.0.1:8000
  # 流复用配置
  stream:
    max-active-streams: 64  # 最大活跃流数量
    idle-timeout: 300000    # 空闲超时时间（毫秒），5分钟无访问自动释放
    cleanup-interval: 60000 # 清理间隔（毫秒），每分钟检查一次
  # 海康摄像头配置（本地测试用）
  hikvision:
    mock-mode: true  # 启用模拟模式，无需真实摄像头
    rtsp-base-url: rtsp://admin:password@192.168.1.100:554/Streaming/Channels/
    username: admin
    password: password123

# Logging
logging:
  level:
    com.example.webrtctest: DEBUG
    org.springframework.web: INFO

